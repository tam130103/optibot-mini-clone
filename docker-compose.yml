version: "3.8"

services:
  # Run the scraper/indexer job
  scraper:
    build: .
    env_file: .env
    volumes:
      - ./data:/app/data
    command: python main.py

  # Interactive chat demo
  chat:
    build: .
    env_file: .env
    volumes:
      - ./data:/app/data
    command: python chat_demo.py
    stdin_open: true
    tty: true
